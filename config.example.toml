[dns]
listen_host = "0.0.0.0"
listen_port = 5353
upstream_dns = "1.1.1.1"
upstream_port = 53

[discord]
webhook_url = "YOUR_DISCORD_WEBHOOK_URL_HERE"
alert_mode = "realtime"   # "realtime" | "hourly" | "daily"
batch_interval_minutes = 60

[blocklist]
sources = [
  "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts",
  "https://adaway.org/hosts.txt"
]
custom = []   # Add your own domains here

[database]
path = "dns_sentinel.db"

[scoring]
groq_api_key = ""               # Optional. Leave empty to use offline rules only.
groq_model   = "llama-3.1-8b-instant"  # Fast + free. See GROQ_SETUP.md.

[bot]
enabled              = true
token                = "YOUR_DISCORD_BOT_TOKEN_HERE"
guild_id             = 123456789   # Right-click your server → Copy Server ID
allowed_channel_ids  = []          # Empty = any channel. List of int IDs to restrict.
allowed_role_ids     = []          # Empty = any user. List of int IDs to restrict.
